# ===========================================
# ErrorWatch Self-Hosted Docker Compose
# ===========================================
# Usage:
#   1. Copy .env.selfhost.example to .env and fill in values
#   2. Download Caddyfile: curl -O https://raw.githubusercontent.com/MakFly/errorwatch/main/deploy/Caddyfile
#   3. docker compose -f docker-compose.selfhost.yml up -d
#
# Database migrations run automatically on API startup.

services:
  postgres:
    image: postgres:16-alpine
    container_name: errorwatch-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-errorwatch}
      POSTGRES_USER: ${POSTGRES_USER:-errorwatch}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - errorwatch
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-errorwatch} -d ${POSTGRES_DB:-errorwatch}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: errorwatch-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - errorwatch
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    image: ghcr.io/makfly/errorwatch-api:${ERRORWATCH_VERSION:-latest}
    container_name: errorwatch-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SELF_HOSTED: "true"
      NODE_ENV: production
      PORT: 3333
      DATABASE_URL: postgresql://${POSTGRES_USER:-errorwatch}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-errorwatch}
      DATABASE_POOL_SIZE: ${DATABASE_POOL_SIZE:-20}
      DATABASE_SSL: ${DATABASE_SSL:-false}
      REDIS_URL: redis://redis:6379
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:?BETTER_AUTH_URL is required}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET is required}
      ADMIN_API_KEY: ${ADMIN_API_KEY:?ADMIN_API_KEY is required}
      API_KEY_HASH_SECRET: ${API_KEY_HASH_SECRET:?API_KEY_HASH_SECRET is required}
      DASHBOARD_URL: ${DASHBOARD_URL:?DASHBOARD_URL is required}
      API_URL: ${API_URL:?API_URL is required}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PRICE_PRO: ${STRIPE_PRICE_PRO:-}
      STRIPE_PRICE_TEAM: ${STRIPE_PRICE_TEAM:-}
      STRIPE_PRICE_ENTERPRISE: ${STRIPE_PRICE_ENTERPRISE:-}
      AUTH_FAIL_OPEN: ${AUTH_FAIL_OPEN:-false}
      SUBSCRIPTION_BYPASS_EMAILS: ${SUBSCRIPTION_BYPASS_EMAILS:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    networks:
      - errorwatch
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3333/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  web:
    image: ghcr.io/makfly/errorwatch-web:${ERRORWATCH_VERSION:-latest}
    container_name: errorwatch-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      SELF_HOSTED: "true"
      AUTH_FAIL_OPEN: ${AUTH_FAIL_OPEN:-false}
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: "0.0.0.0"
      ADMIN_API_KEY: ${ADMIN_API_KEY}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL}
    networks:
      - errorwatch
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  caddy:
    image: caddy:2-alpine
    container_name: errorwatch-caddy
    restart: unless-stopped
    depends_on:
      web:
        condition: service_healthy
      api:
        condition: service_healthy
    ports:
      - "${CADDY_HTTP_PORT:-80}:80"
      - "${CADDY_HTTPS_PORT:-443}:443"
    environment:
      DOMAIN: ${DOMAIN:?DOMAIN is required}
      BASE_DOMAIN: ${BASE_DOMAIN:-${DOMAIN}}
      ACME_EMAIL: ${ACME_EMAIL:?ACME_EMAIL is required}
      DASHBOARD_UPSTREAM: web:3000
      API_UPSTREAM: api:3333
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - errorwatch

networks:
  errorwatch:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:
