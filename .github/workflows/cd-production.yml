name: CD Production

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version to deploy (for example 0.7.0 or v0.7.0)'
        required: true
        type: string

concurrency:
  group: cd-production
  cancel-in-progress: false

jobs:
  preflight:
    name: Preflight (CD config)
    runs-on: ubuntu-latest
    outputs:
      ready: ${{ steps.check.outputs.ready }}
    steps:
      - name: Check required deployment secrets
        id: check
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_USER: ${{ secrets.PROD_USER }}
          PROD_SSH_KEY: ${{ secrets.PROD_SSH_KEY }}
        run: |
          set -euo pipefail
          if [ -n "${PROD_HOST}" ] && [ -n "${PROD_USER}" ] && [ -n "${PROD_SSH_KEY}" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
            echo "CD secrets present."
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::warning::CD skipped: missing PROD_HOST/PROD_USER/PROD_SSH_KEY"
          fi

  deploy:
    name: Deploy self-hosted bundle to production
    needs: preflight
    if: ${{ needs.preflight.outputs.ready == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment: production
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload self-host bundle
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          source: "docker-compose.selfhost.yml,run-selfhost.sh,Caddyfile"
          target: /opt/errorwatch

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            cd /opt/errorwatch

            if [ ! -f .env ]; then
              echo "[ERROR] Missing /opt/errorwatch/.env on the server."
              exit 1
            fi

            chmod +x run-selfhost.sh

            version="${{ github.event.inputs.version }}"
            version="${version#v}"

            if grep -q '^ERRORWATCH_VERSION=' .env; then
              sed -i "s/^ERRORWATCH_VERSION=.*/ERRORWATCH_VERSION=${version}/" .env
            else
              printf '\nERRORWATCH_VERSION=%s\n' "$version" >> .env
            fi

            ./run-selfhost.sh deploy
