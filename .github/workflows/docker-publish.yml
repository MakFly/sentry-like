name: Build & Publish Docker Images

on:
  push:
    tags:
      - 'v*'
  schedule:
    - cron: '0 3 * * 1'  # Every Monday at 3am UTC
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Build only (no push)'
        type: boolean
        default: false

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: api
            image: errorwatch-api
          - target: web
            image: errorwatch-web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/makfly/${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}},enable=${{ github.event_name == 'push' }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ github.event_name == 'push' }}
            type=raw,value=latest,enable=${{ github.event_name == 'push' }}
            type=raw,value=dev,enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          target: ${{ matrix.target }}
          push: ${{ !(github.event.inputs.dry_run == 'true') }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_APP_URL=http://localhost
            NEXT_PUBLIC_MONITORING_API_URL=http://localhost:3333

  # =========================================
  # Cleanup old GHCR images (runs on schedule
  # and after each build-and-push)
  # =========================================
  cleanup:
    if: always()
    needs: [build-and-push]
    # Run even when build-and-push is skipped (schedule trigger)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package: [errorwatch-api, errorwatch-web]
    steps:
      - name: Delete untagged images
        uses: dataaxiom/ghcr-cleanup-action@v1
        with:
          package: ${{ matrix.package }}
          token: ${{ secrets.GITHUB_TOKEN }}
          delete-untagged: true

      - name: Delete images older than 7 days (keep latest, prod, semver)
        uses: dataaxiom/ghcr-cleanup-action@v1
        with:
          package: ${{ matrix.package }}
          token: ${{ secrets.GITHUB_TOKEN }}
          delete-untagged: false
          older-than: 7 days
          keep-n-tagged: 5
          exclude-tags: 'latest,prod,dev'
          validate: true
