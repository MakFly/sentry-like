name: Build & Publish Docker Images

on:
  release:
    types: [published]
  push:
    tags:
      - 'v*'
  schedule:
    - cron: '0 3 * * 1'  # Every Monday at 3am UTC
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Build only (no push)'
        type: boolean
        default: false

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: api
            image: errorwatch-api
          - target: web
            image: errorwatch-web
    steps:
      - name: Resolve image tags
        id: vars
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "release" ]] || [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == "refs/tags/v"* ]]; then
            if [[ "${{ github.event_name }}" == "release" ]]; then
              git_ref="${{ github.event.release.tag_name }}"
            else
              git_ref="${{ github.ref_name }}"
            fi
            version="${git_ref#v}"
            major_minor="$(printf '%s' "$version" | awk -F. '{print $1 "." $2}')"
            echo "git_ref=${git_ref}" >> "$GITHUB_OUTPUT"
            echo "tags=ghcr.io/makfly/${{ matrix.image }}:${version},ghcr.io/makfly/${{ matrix.image }}:${major_minor},ghcr.io/makfly/${{ matrix.image }}:latest" >> "$GITHUB_OUTPUT"
          else
            echo "git_ref=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
            echo "tags=ghcr.io/makfly/${{ matrix.image }}:dev" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.vars.outputs.git_ref }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build web image for runtime smoke test
        if: matrix.target == 'web'
        uses: docker/build-push-action@v6
        with:
          context: .
          target: web
          load: true
          tags: errorwatch-web:smoke
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test web runtime config
        if: matrix.target == 'web'
        run: ./scripts/smoke-test-web-runtime-config.sh errorwatch-web:smoke

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          target: ${{ matrix.target }}
          push: ${{ github.event.inputs.dry_run != 'true' }}
          tags: ${{ steps.vars.outputs.tags }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # =========================================
  # Cleanup old GHCR images (runs on schedule
  # and after each build-and-push)
  # =========================================
  cleanup:
    if: always()
    needs: [build-and-push]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package: [errorwatch-api, errorwatch-web]
    steps:
      - name: Delete untagged images
        uses: dataaxiom/ghcr-cleanup-action@v1
        with:
          package: ${{ matrix.package }}
          token: ${{ secrets.GITHUB_TOKEN }}
          delete-untagged: true

      - name: Delete images older than 30 days (keep all semver)
        uses: dataaxiom/ghcr-cleanup-action@v1
        with:
          package: ${{ matrix.package }}
          token: ${{ secrets.GITHUB_TOKEN }}
          delete-untagged: false
          older-than: 30 days
          keep-n-tagged: 20
          exclude-tags: 'latest,dev'
          validate: true
